version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bukz-postgres
    environment:
      POSTGRES_USER: bukz
      POSTGRES_PASSWORD: bukz_dev_password
      POSTGRES_DB: bukz_db
    ports:
      - '5432:5432'
    volumes:
      - bukz_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bukz -d bukz_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bukz-redis
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - bukz_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bukz_postgres_data:
  bukz_redis_data:
